name: "Issue"
description: "Report a bug or request a feature"
title: "[Issue] "
labels: ["triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
      placeholder: What happened? What do you want?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add context, repro steps, logs, or screenshots.
      placeholder: Steps to reproduce, expected behavior, actual behavior...
